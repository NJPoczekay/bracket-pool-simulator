# Pool Tracker config only.
# Keep pre-lock optimizer assumptions out of this file; Bracket Lab stays separate.

[[pools]]
id = "main"
name = "Main Pool"
group_url = "https://fantasy.espn.com/games/tournament-challenge-bracket-2026/group?id=YOUR_GROUP_ID"
ratings_file = "data/ratings/2026.csv"
use_kenpom = false
min_usable_entries = 1
n_sims = 100000
seed = 42
batch_size = 50000
engine = "numpy"
scoring_system = "1-2-4-8-16-32"

[pools.schedule]
enabled = true
daily_time = "08:00:00"
timezone = "America/Los_Angeles"

