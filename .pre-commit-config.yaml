repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.0
    hooks:
      - id: ruff-check
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.15.0
    hooks:
      - id: mypy
        additional_dependencies:
          - pydantic
          - pydantic-settings
          - typer

  - repo: local
    hooks:
      - id: pytest
        name: pytest
        entry: uv run --extra dev pytest
        language: system
        pass_filenames: false
        always_run: true
